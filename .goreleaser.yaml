version: 2

# Pinned explicitly: GoReleaser otherwise derives this from go.mod's last
# path segment, which is now "v2" after the SIV migration. A "v2" project
# name would rename release assets to v2-<os>-<arch>.tar.gz, breaking both
# install.sh and the self-update path (which expect "redmine-cli-...").
project_name: redmine-cli

before:
  hooks:
    - mkdir -p completions
    - sh -c "go run ./cmd/redmine completion bash > completions/redmine.bash"
    - sh -c "go run ./cmd/redmine completion zsh > completions/redmine.zsh"
    - sh -c "go run ./cmd/redmine completion fish > completions/redmine.fish"

builds:
  - binary: redmine
    main: ./cmd/redmine
    ldflags:
      - -s -w -X main.version={{ .Version }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}"
    files:
      - completions/*

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^Merge "

homebrew_casks:
  - name: redmine
    binaries:
      - redmine
    completions:
      bash: completions/redmine.bash
      zsh: completions/redmine.zsh
      fish: completions/redmine.fish
    hooks:
      post:
        install: |
          system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/redmine"]
    repository:
      owner: aarondpn
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/aarondpn/redmine-cli
    description: CLI tool for interacting with Redmine project management

release:
  github:
    owner: aarondpn
    name: redmine-cli
