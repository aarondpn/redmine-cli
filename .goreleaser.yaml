version: 2

before:
  hooks:
    - mkdir -p completions
    - sh -c "go run . completion bash > completions/redmine.bash"
    - sh -c "go run . completion zsh > completions/redmine.zsh"
    - sh -c "go run . completion fish > completions/redmine.fish"

builds:
  - binary: redmine
    ldflags:
      - -s -w -X main.version={{ .Version }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}"
    files:
      - completions/*

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^Merge "

homebrew_casks:
  - name: redmine
    binaries:
      - redmine
    completions:
      bash: completions/redmine.bash
      zsh: completions/redmine.zsh
      fish: completions/redmine.fish
    repository:
      owner: aarondpn
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/aarondpn/redmine-cli
    description: CLI tool for interacting with Redmine project management

release:
  github:
    owner: aarondpn
    name: redmine-cli
