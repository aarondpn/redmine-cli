name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          BINARY_NAME="redmine"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BINARY_NAME="redmine.exe"
          fi
          go build -ldflags "-X main.version=${VERSION}" -o "${BINARY_NAME}" .

      - name: Archive (tar.gz)
        if: matrix.goos != 'windows'
        run: |
          tar czf "redmine-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" redmine

      - name: Archive (zip)
        if: matrix.goos == 'windows'
        run: |
          zip "redmine-${{ matrix.goos }}-${{ matrix.goarch }}.zip" redmine.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: redmine-${{ matrix.goos }}-${{ matrix.goarch }}
          path: redmine-*.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            redmine-*.tar.gz
            redmine-*.zip
