name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.26"

      - name: Verify module path matches tag major version
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          major="${tag#v}"
          major="${major%%.*}"
          module=$(awk '/^module /{print $2}' go.mod)
          base="${module%/v[0-9]*}"
          if [ "$major" -ge 2 ]; then
            expected="${base}/v${major}"
          else
            expected="${base}"
          fi
          if [ "$module" != "$expected" ]; then
            echo "::error::go.mod module path '$module' does not match tag '$tag' (expected '$expected')"
            echo "For v2+ tags, bump go.mod module to end with /vN and rewrite imports accordingly."
            exit 1
          fi

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
