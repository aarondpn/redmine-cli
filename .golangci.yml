linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gofmt
    - ineffassign
    - gosimple

issues:
  exclude-rules:
    # MarkFlagRequired on freshly defined flags cannot fail
    - linters: [errcheck]
      source: "MarkFlagRequired"
    # Render/Stop calls in output helpers return errors we can't handle meaningfully
    - linters: [errcheck]
      path: internal/output/
    # Test helpers — encoding errors in httptest handlers are fine to ignore
    - linters: [errcheck]
      path: _test\.go
